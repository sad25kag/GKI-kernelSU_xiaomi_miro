name: Build Miro GKI Vendor
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Build Script
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm-dev libssl-dev ccache libelf-dev libncurses-dev
          
      - name: Download Toolchain (AOSP Clang)
        run: |
          mkdir clang
          curl -LSs https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522830.tar.gz -o clang.tar.gz
          tar -xf clang.tar.gz -C clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          # Pakai git clone manual biar kita bisa lihat progressnya
          git clone --depth=1 -b bsp-miro-v-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel-source

      - name: Setup Official KernelSU
        run: |
          # Cari folder di mana Makefile berada (buat jaga-jaga kalau foldernya nested)
          KROOT=$(find $(pwd)/kernel-source -name Makefile | xargs grep -l "KERNELVERSION" | head -n 1 | xargs dirname)
          echo "KERNEL_ROOT=$KROOT" >> $GITHUB_ENV
          
          cd $KROOT
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          # Fix Recursive Dependency
          if [ -f drivers/Kconfig ]; then
            sed -i '/source "drivers\/kernelsu\/Kconfig"/d' drivers/Kconfig
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          fi

      - name: Build Kernel
        run: |
          cd ${{ env.KERNEL_ROOT }}
          
          # CARI DEFCONFIG DI MANA SAJA
          # Berdasarkan board Snapdragon 8 Elite (sun)
          CONF_PATH=$(find . -name "sun_defconfig" -o -name "miro_defconfig" | head -n 1)
          
          if [ -z "$CONF_PATH" ]; then
            echo "Miro/Sun config not found, searching for any vendor config..."
            CONF_PATH=$(find arch/arm64/configs/vendor -name "*_defconfig" | head -n 1)
          fi
          
          # Ambil nama file saja tanpa path lengkap untuk 'make'
          DEFCONFIG=$(basename $CONF_PATH)
          echo "---> FIX DEFCONFIG: $DEFCONFIG"
          
          # Proses Compile (Full LLVM + No Warnings)
          make O=out ARCH=arm64 $DEFCONFIG
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            LLVM=1 \
            LLVM_IAS=1 \
            KCFLAGS="-w" \
            ALLOW_MISSING_DTB_OVERLAY=1

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          # Cari file Image hasil compile
          IMG=$(find ${{ env.KERNEL_ROOT }}/out -name "Image" | head -n 1)
          if [ -f "$IMG" ]; then
            cp "$IMG" AnyKernel3/
            cd AnyKernel3 && zip -r9 "../Kernel-Miro-KSU-Official.zip" .
          else
            echo "FILE IMAGE TIDAK KETEMU!"
            exit 1
          fi

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Miro-KSU-Official
          path: Kernel-Miro-KSU-Official.zip
