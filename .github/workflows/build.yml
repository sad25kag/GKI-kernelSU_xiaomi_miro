name: Build Miro GKI Vendor
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Build Script
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm-dev libssl-dev ccache
          
      - name: Download Toolchain (Proton Clang)
        run: |
          mkdir clang
          cd clang
          # Pakai Proton Clang terbaru yang lebih stabil buat di-download
          curl -LO https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz --strip-components=1
          echo "CLANG_PATH=$(pwd)/bin" >> $GITHUB_ENV


      - name: Clone Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: bsp-miro-v-oss
          path: kernel-source
          fetch-depth: 1

      - name: Setup Official KernelSU
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Build Kernel
        run: |
          export PATH=${{ env.CLANG_PATH }}:$PATH
          cd kernel-source
          
          # Cek defconfig: Xiaomi Miro (sun) biasanya pakai miro_defconfig atau sun_defconfig
          # Kita coba prioritaskan miro_defconfig sesuai codename
          make O=out ARCH=arm64 vendor/miro_defconfig || make O=out ARCH=arm64 vendor/sun_defconfig
          
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            LD=ld.lld \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Package with AnyKernel3
        run: |
          # Clone template AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/README.md
          
          # Masukkan file Image hasil compile ke folder AnyKernel3
          cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          
          # Buat file ZIP
          cd AnyKernel3
          zip -r9 "../Kernel-Miro-KSU-Official.zip" . -x ".git*"

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Miro-KSU-Official
          path: Kernel-Miro-KSU-Official.zip

