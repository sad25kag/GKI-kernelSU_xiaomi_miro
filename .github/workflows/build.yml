name: Build Miro GKI Vendor
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Build Script
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm-dev libssl-dev ccache libelf-dev libncurses-dev
          
      - name: Download Toolchain (AOSP Clang)
        run: |
          mkdir clang
          curl -LSs https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522830.tar.gz -o clang.tar.gz
          tar -xf clang.tar.gz -C clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: bsp-miro-v-oss
          path: kernel-source
          fetch-depth: 1

      - name: Setup Official KernelSU
        run: |
          cd kernel-source
          # Gunakan cara manual agar tidak terjadi 'recursive dependency'
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          # Fix Kconfig recursive issue
          sed -i '/source "drivers\/kernelsu\/Kconfig"/d' drivers/Kconfig
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

      - name: Build Kernel
        run: |
          cd kernel-source
          
          # NGINTIP DEFCONFIG (Biar kita tahu nama aslinya apa)
          echo "Listing available configs..."
          ls arch/arm64/configs/vendor/ || ls arch/arm64/configs/
          
          # AUTO-DETECT DEFCONFIG (Mencari yg paling cocok untuk Miro/Sun)
          CONF_PATH=$(find arch/arm64/configs -name "*miro*" -o -name "*sun*" | head -n 1)
          if [ -z "$CONF_PATH" ]; then
            echo "Miro/Sun config not found, falling back to gki_defconfig"
            DEFCONFIG="gki_defconfig"
          else
            DEFCONFIG=$(basename $CONF_PATH)
          fi
          
          echo "---> MENGGUNAKAN DEFCONFIG: $DEFCONFIG"
          
          # Proses Compile (Full LLVM)
          make O=out ARCH=arm64 $DEFCONFIG
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            LLVM=1 \
            LLVM_IAS=1 \
            ALLOW_MISSING_DTB_OVERLAY=1

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          rm -rf AnyKernel3/.git
          # Pastikan file Image ada
          if [ -f kernel-source/out/arch/arm64/boot/Image ]; then
            cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          else
            echo "ERROR: Kernel Image not found!"
            exit 1
          fi
          cd AnyKernel3 && zip -r9 "../Kernel-Miro-KSU-Official.zip" .

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Miro-KSU-Official
          path: Kernel-Miro-KSU-Official.zip
